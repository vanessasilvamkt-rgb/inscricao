<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ficha de Inscrição</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F3EE;
      --card: #FFFFFF;
      --accent: #1B4332;
      --accent-light: #D8F3DC;
      --accent-mid: #40916C;
      --text: #1A1A1A;
      --muted: #6B7280;
      --border: #E5E7EB;
      --error: #DC2626;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .header { text-align: center; margin-bottom: 2rem; }

    .logo-circle {
      width: 60px; height: 60px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem; font-weight: 400;
      color: var(--accent); margin-bottom: 0.25rem;
    }

    .subtitle { font-size: 0.9rem; color: var(--muted); }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.75rem;
      width: 100%; max-width: 480px;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--accent-mid); margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 1.1rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block; font-size: 0.8rem;
      font-weight: 500; color: var(--muted); margin-bottom: 5px;
    }

    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--text);
      background: #FAFAFA;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    input:focus { border-color: var(--accent-mid); background: #fff; }
    input.error { border-color: var(--error); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-phone { display: grid; grid-template-columns: 85px 1fr; gap: 12px; }

    .btn {
      width: 100%; max-width: 480px; padding: 14px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--accent-mid); }
    .btn:active { transform: scale(0.98); }

    .error-msg {
      font-size: 0.82rem; color: var(--error);
      text-align: center; margin-top: 10px; display: none;
    }

    .success-view {
      display: none; text-align: center;
      width: 100%; max-width: 480px;
    }

    .success-icon {
      width: 72px; height: 72px;
      background: var(--accent-light); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .success-view h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem; font-weight: 400;
      color: var(--accent); margin-bottom: 0.5rem;
    }

    .success-view p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    .btn-ghost {
      background: transparent; border: 1.5px solid var(--accent);
      color: var(--accent); padding: 10px 24px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .btn-ghost:hover { background: var(--accent-light); }

    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,0.7); z-index: 100;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 0.9rem; color: var(--accent); font-weight: 500; }

    footer { margin-top: 2rem; font-size: 0.75rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>Enviando inscrição...</p>
  </div>

  <div class="header">
    <div class="logo-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <h1>Ficha de Inscrição</h1>
    <p class="subtitle">Preencha os dados abaixo para se inscrever</p>
  </div>

  <div id="form-view" style="width:100%;max-width:480px;">
    <div class="card">
      <p class="section-label">Dados pessoais</p>

      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" />
      </div>

      <div class="field">
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
      </div>

      <div class="field">
        <label>Data de nascimento</label>
        <input type="date" id="dataNasc" />
      </div>

      <div class="field">
        <label>Telefone</label>
        <div class="row-phone">
          <input type="text" id="ddd" placeholder="(11)" maxlength="4" />
          <input type="text" id="telefone" placeholder="00000-0000" maxlength="10" />
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-label">Dados do imóvel</p>
      <div class="field">
        <label>Condomínio</label>
        <input type="text" id="condominio" placeholder="Nome do condomínio" />
      </div>
      <div class="row">
        <div class="field">
          <label>Apartamento</label>
          <input type="text" id="apto" placeholder="Ex: 101" />
        </div>
        <div class="field">
          <label>Torre</label>
          <input type="text" id="torre" placeholder="Ex: A" />
        </div>
      </div>
    </div>

    <button class="btn" onclick="enviar()">Confirmar inscrição</button>
    <p class="error-msg" id="erro"></p>
  </div>

  <div class="success-view" id="success-view">
    <div class="success-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1B4332" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h2>Inscrição realizada!</h2>
    <p id="success-msg">Seus dados foram salvos com sucesso.</p>
    <button class="btn-ghost" onclick="resetar()">Nova inscrição</button>
  </div>

  <footer>© Ficha de Inscrição — todos os direitos reservados</footer>

  <script>
    // ⚠️ SUBSTITUA pela URL do seu Google Apps Script após publicar
    const SCRIPT_URL = https://script.google.com/macros/s/AKfycbzjHv61GmgQ5ZnITMuLiuKZW9LPvPrSUkZf9SWcWGS4yHXP6FJ7fSL_HFnv5ZBa2k6u/exec;

    document.getElementById('cpf').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').substring(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2')
           .replace(/(\d{3})(\d)/, '$1.$2')
           .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      this.value = v;
    });

    document.getElementById('ddd').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').substring(0, 2);
      if (v.length > 0) v = '(' + v;
      if (v.length === 3) v += ')';
      this.value = v;
    });

    document.getElementById('telefone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').substring(0, 9);
      if (v.length > 5) v = v.substring(0,5) + '-' + v.substring(5);
      this.value = v;
    });

    async function enviar() {
      const campos = ['nome','cpf','dataNasc','ddd','telefone','condominio','apto','torre'];
      let valido = true;
      campos.forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('error');
        if (!el.value.trim()) { el.classList.add('error'); valido = false; }
      });

      const erro = document.getElementById('erro');
      if (!valido) {
        erro.textContent = 'Por favor, preencha todos os campos obrigatórios.';
        erro.style.display = 'block';
        return;
      }
      erro.style.display = 'none';

      const [ano, mes, dia] = document.getElementById('dataNasc').value.split('-');
      const payload = {
        nome: document.getElementById('nome').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        dataNascimento: `${dia}/${mes}/${ano}`,
        telefone: document.getElementById('ddd').value.trim() + ' ' + document.getElementById('telefone').value.trim(),
        condominio: document.getElementById('condominio').value.trim(),
        apartamento: document.getElementById('apto').value.trim(),
        torre: document.getElementById('torre').value.trim()
      };

      document.getElementById('loading').style.display = 'flex';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success-msg').textContent =
          payload.nome + ' — ' + payload.condominio + ', Torre ' + payload.torre + ', Apto ' + payload.apartamento;
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        erro.textContent = 'Erro ao enviar. Verifique sua conexão e tente novamente.';
        erro.style.display = 'block';
      }
    }

    function resetar() {
      ['nome','cpf','dataNasc','ddd','telefone','condominio','apto','torre'].forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
        el.classList.remove('error');
      });
      document.getElementById('form-view').style.display = 'block';
      document.getElementById('success-view').style.display = 'none';
    }
  </script>
</body>
</html>
